
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Biblioteca de Jogos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header">
    <section class="grid grid-template-columns-1">

      <div class="item">
        <img src="https://wellfsilva.github.io/minha-biblioteca/lojas/joystick-icon.gif" class="logo">
      </div>

      <div class="item filtroNome">
          <input type="text" id="searchInput" placeholder="Buscar jogo...">
          <button id="clearSearch" class="clear-btn">✖</button>
      </div> 
      
      <div class="item">

        <div class="filters">
          <div class="filter-group">
<!--             <div class="filter-header">
              <button id="select-all-sources">Selecionar todos</button>
            </div> -->

            <div id="source-filters" class="source-filters">
           
            </div>
          </div>
        </div>

      </div>

    </section>
  </div><!--  Fim da div header -->

  <div id="gamesContainer" class="games-grid"></div>

  <script src="script.js"></script>
</body>
</html>
